<script>
    (function () {
        var link = document.getElementById('windwise-link');
        if (!link) return;
        var li = link.closest('li');
        var pop = li.querySelector('.popover');
        var hideTimeout = null;

        function showPopover() {
            pop.classList.add('visible');
            pop.setAttribute('aria-hidden', 'false');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hidePopover, 5000);
        }

        function hidePopover() {
            pop.classList.remove('visible');
            pop.setAttribute('aria-hidden', 'true');
            if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
        }

        link.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            if (pop.classList.contains('visible')) hidePopover(); else showPopover();
        });

        // Close when clicking outside
        document.addEventListener('click', function (e) {
            if (!li.contains(e.target)) hidePopover();
        });

        // Close on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' || e.key === 'Esc') hidePopover();
        });
    })();
</script>
